<!DOCTYPE html>
<html>
<head>
<script type="importmap">
{
  "imports": {
    "@alephium/web3": "https://esm.sh/@alephium/web3@2.0.8",
    "@alephium/web3-wallet": "https://esm.sh/@alephium/web3-wallet@2.0.8?external=@alephium/web3"
  }
}
</script>
</head>
<body>
<pre id="out"></pre>
<script type="module">
const out = document.getElementById('out');
function log(msg) { out.textContent += msg + '\n'; }

try {
  const alphWeb3 = (await import('@alephium/web3')).default;
  const { web3, NodeProvider } = alphWeb3;
  const alphWallet = (await import('@alephium/web3-wallet')).default;
  const { PrivateKeyWallet } = alphWallet;

  const url = 'https://node.testnet.alephium.org';
  const np = new NodeProvider(url);
  log('NodeProvider created: ' + !!np);
  log('np.transactions: ' + typeof np.transactions);

  // Test 1: set global provider
  web3.setCurrentNodeProvider(url);
  log('\nTest 1: global web3.getCurrentNodeProvider()');
  try {
    const gp = web3.getCurrentNodeProvider();
    log('  OK: ' + typeof gp);
  } catch(e) { log('  FAIL: ' + e.message); }

  // Test 2: create wallet WITHOUT nodeProvider
  log('\nTest 2: wallet without nodeProvider');
  const testKey = 'a'.repeat(64);
  try {
    const w1 = new PrivateKeyWallet({ privateKey: testKey });
    log('  wallet created, address: ' + w1.address);
    log('  w1._nodeProvider: ' + typeof w1._nodeProvider);
    try {
      const wp = w1.nodeProvider;
      log('  w1.nodeProvider: ' + typeof wp);
    } catch(e) { log('  w1.nodeProvider FAIL: ' + e.message); }
  } catch(e) { log('  FAIL: ' + e.message); }

  // Test 3: create wallet WITH nodeProvider
  log('\nTest 3: wallet with nodeProvider');
  try {
    const w2 = new PrivateKeyWallet({ privateKey: testKey, nodeProvider: np });
    log('  wallet created, address: ' + w2.address);
    log('  w2._nodeProvider: ' + typeof w2._nodeProvider);
    try {
      const wp = w2.nodeProvider;
      log('  w2.nodeProvider: ' + typeof wp);
      log('  same as np? ' + (wp === np));
    } catch(e) { log('  w2.nodeProvider FAIL: ' + e.message); }
  } catch(e) { log('  FAIL: ' + e.message); }

  // Test 4: create wallet with keyType bip340-schnorr + nodeProvider
  log('\nTest 4: wallet with bip340-schnorr + nodeProvider');
  try {
    const w3 = new PrivateKeyWallet({ privateKey: testKey, keyType: 'bip340-schnorr', nodeProvider: np });
    log('  wallet created, address: ' + w3.address);
    log('  w3._nodeProvider: ' + typeof w3._nodeProvider);
    try {
      const wp = w3.nodeProvider;
      log('  w3.nodeProvider: ' + typeof wp);
    } catch(e) { log('  w3.nodeProvider FAIL: ' + e.message); }
  } catch(e) { log('  FAIL: ' + e.message); }

  // Test 5: try actual API call
  log('\nTest 5: API call via wallet.nodeProvider');
  try {
    const w4 = new PrivateKeyWallet({ privateKey: testKey, keyType: 'bip340-schnorr', nodeProvider: np });
    const info = await w4.nodeProvider.infos.getInfosSelfClique();
    log('  OK: chainNum=' + info.chainNum);
  } catch(e) { log('  FAIL: ' + e.message); }

} catch(e) {
  log('ERROR: ' + e.message + '\n' + e.stack);
}
</script>
</body>
</html>
