<script>
// Show error if module takes too long to load

<script type="module">
import { schnorr } from 'https://esm.sh/@noble/curves@1.8.1/secp256k1';
import { sha256 } from 'https://esm.sh/@noble/hashes@1.7.1/sha256';
import { bytesToHex, hexToBytes } from 'https://esm.sh/@noble/hashes@1.7.1/utils';

// ============================================================
// State
// ============================================================

const state = {
  token: null,
  secBytes: null,
  pubKeyHex: null,
  npub: null,
  btcAddress: null,
  alphAddress: null,
  network: 'devnet',
  role: null,
  peerPubHex: null,
  sessionId: null,
  relays: [],       // [{ws, url, ready}]
  seenEvents: new Set(), // dedup event IDs across relays
  subscriptions: new Map(),
  msgFilter: 'all',
  stepData: {},
  selectedUtxo: null,
};

// ============================================================
// Multi-Relay Nostr Client
// ============================================================

const DEFAULT_RELAYS = [
  'wss://relay.damus.io',
  'wss://nos.lol',
  'wss://relay.primal.net',
];

function connectRelay(url) {
  return new Promise((resolve, reject) => {
    const ws = new WebSocket(url);
    const timer = setTimeout(() => { ws.close(); reject(new Error(`timeout: ${url}`)); }, 8000);
    ws.onopen = () => { clearTimeout(timer); resolve(ws); };
    ws.onerror = () => { clearTimeout(timer); reject(new Error(`error: ${url}`)); };
  });
}

async function connectRelays(urls) {
  const statusEl = document.getElementById('connect-status');
  const results = await Promise.allSettled(urls.map(async (url) => {
    if (statusEl) statusEl.textContent = `Connecting to ${url.replace('wss://','')}...`;
    const ws = await connectRelay(url);
    return { ws, url, ready: true };
  }));
  const connected = results.filter(r => r.status === 'fulfilled').map(r => r.value);
  const failed = results.filter(r => r.status === 'rejected').map((r, i) => urls[i]);
  if (failed.length > 0) console.warn('Failed relays:', failed);
  if (connected.length === 0) throw new Error('Could not connect to any relay. Check your network connection.');
  state.relays = connected;
  return connected;
}

function nostrSerialize(event) {
  return JSON.stringify([0, event.pubkey, event.created_at, event.kind, event.tags, event.content]);
}

async function signEvent(template) {
  const event = { ...template, pubkey: state.pubKeyHex };
  const serialized = new TextEncoder().encode(nostrSerialize(event));
  const id = bytesToHex(sha256(serialized));
  event.id = id;
  event.sig = bytesToHex(schnorr.sign(hexToBytes(id), state.secBytes));
  return event;
}

// Publish to all connected relays, resolve when at least one accepts
function nostrPublish(event) {
  return new Promise((resolve, reject) => {
    let resolved = false;
    let errors = 0;
    const timer = setTimeout(() => { if (!resolved) reject(new Error('publish timeout')); }, 10000);

    for (const relay of state.relays) {
      if (!relay.ready || relay.ws.readyState !== WebSocket.OPEN) { errors++; continue; }
      const handler = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg[0] === 'OK' && msg[1] === event.id) {
            relay.ws.removeEventListener('message', handler);
            if (!resolved) { resolved = true; clearTimeout(timer); resolve(msg[2]); }
          }
        } catch {}
      };
      relay.ws.addEventListener('message', handler);
      try { relay.ws.send(JSON.stringify(['EVENT', event])); }
      catch { errors++; relay.ws.removeEventListener('message', handler); }
    }
    if (errors >= state.relays.length) {
      clearTimeout(timer);
      reject(new Error('No relays available'));
    }
  });
}

// Subscribe on all relays with dedup
function subscribe(subId, filters, onEvent) {
  const handlers = [];
  for (const relay of state.relays) {
    if (!relay.ready || relay.ws.readyState !== WebSocket.OPEN) continue;
    const handler = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg[0] === 'EVENT' && msg[1] === subId) {
          const event = msg[2];
          if (state.seenEvents.has(event.id)) return; // dedup
          state.seenEvents.add(event.id);
          onEvent(event);
        }
      } catch {}
    };
    relay.ws.addEventListener('message', handler);
    try { relay.ws.send(JSON.stringify(['REQ', subId, ...filters])); } catch {}
    handlers.push({ ws: relay.ws, handler });
  }
  const unsub = () => {
    for (const { ws, handler } of handlers) {
      ws.removeEventListener('message', handler);
      try { ws.send(JSON.stringify(['CLOSE', subId])); } catch {}
    }
  };
  state.subscriptions.set(subId, unsub);
  return unsub;
}

function waitForSwapEvent(kind, sessionId, fromPub, predicate = null, timeoutMs = state.network === 'testnet' ? 600000 : 120000) {
  return new Promise((resolve, reject) => {
    const subId = 'sw_' + Math.random().toString(36).slice(2, 10);
    const timeout = setTimeout(() => {
      unsub();
      reject(new Error(`timeout waiting for kind ${kind}`));
    }, timeoutMs);
    const unsub = subscribe(subId,
      [{ kinds: [kind], '#e': [sessionId], authors: [fromPub] }],
      (event) => {
        if (predicate && !predicate(event)) return;
        unsub();
        clearTimeout(timeout);
        resolve(event);
      });
  });
}

// ============================================================
// Event Kinds & Builders
// ============================================================

const SWAP_SETUP_KIND  = 38390;
const SWAP_NONCE_KIND  = 38391;
const SWAP_PRESIG_KIND = 38392;
const SWAP_CLAIM_KIND  = 38393;

async function createChatEvent(content) {
  return signEvent({
    kind: 1,
    created_at: Math.floor(Date.now() / 1000),
    tags: state.sessionId ? [['e', state.sessionId], ['t', 'atomicswap']] : [['t', 'atomicswap']],
    content,
  });
}

async function createSwapSetup({ sessionId, recipientPubHex, msgType, ...data }) {
  return signEvent({
    kind: SWAP_SETUP_KIND,
    created_at: Math.floor(Date.now() / 1000),
    tags: [['e', sessionId], ['p', recipientPubHex], ['d', `${sessionId}:${msgType}`]],
    content: JSON.stringify({ type: msgType, ...data }),
  });
}

async function createSwapNonce({ sessionId, recipientPubHex, phase, ...data }) {
  return signEvent({
    kind: SWAP_NONCE_KIND,
    created_at: Math.floor(Date.now() / 1000),
    tags: [['e', sessionId], ['p', recipientPubHex], ['d', `${sessionId}:${phase}`]],
    content: JSON.stringify({ phase, ...data }),
  });
}

async function createSwapPresig({ sessionId, recipientPubHex, ...data }) {
  return signEvent({
    kind: SWAP_PRESIG_KIND,
    created_at: Math.floor(Date.now() / 1000),
    tags: [['e', sessionId], ['p', recipientPubHex], ['d', sessionId]],
    content: JSON.stringify(data),
  });
}

async function createSwapClaim({ sessionId, recipientPubHex, claimType, ...data }) {
  return signEvent({
    kind: SWAP_CLAIM_KIND,
    created_at: Math.floor(Date.now() / 1000),
    tags: [['e', sessionId], ['p', recipientPubHex], ['d', `${sessionId}:${claimType}`]],
    content: JSON.stringify({ type: claimType, ...data }),
  });
}

// ============================================================
// API helpers
// ============================================================

const API = window.location.origin;

async function api(path, body = {}) {
  const res = await fetch(`${API}${path}`, {
    method: body && Object.keys(body).length ? 'POST' : 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: body && Object.keys(body).length ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function apiPost(path, body) {
  const res = await fetch(`${API}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ============================================================
// UI: Messages
// ============================================================

const messagesEl = document.getElementById('messages');

function addMessage(type, content, author = null) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.dataset.type = type === 'chat' ? 'chat' : 'protocol';

  const tagNames = { chat: 'CHAT', setup: 'SETUP', nonce: 'NONCE', presig: 'PRESIG', claim: 'CLAIM' };
  let html = `<span class="tag">${tagNames[type] || type}</span>`;
  if (author) html += `<span class="author">${author}</span> `;
  html += `<span class="body">${escapeHtml(content)}</span>`;
  div.innerHTML = html;

  messagesEl.appendChild(div);
  applyFilter();
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addProtocolMsg(kind, content, author) {
  const kindMap = {
    [SWAP_SETUP_KIND]: 'setup',
    [SWAP_NONCE_KIND]: 'nonce',
    [SWAP_PRESIG_KIND]: 'presig',
    [SWAP_CLAIM_KIND]: 'claim',
  };
  const type = kindMap[kind] || 'setup';
  let text = content;
  try {
    const parsed = JSON.parse(content);
    text = Object.entries(parsed).map(([k, v]) => {
      const vs = String(v);
      return `${k}: ${vs.length > 24 ? vs.slice(0, 24) + '...' : vs}`;
    }).join(' | ');
  } catch {}
  addMessage(type, text, author);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function applyFilter() {
  const filter = state.msgFilter;
  messagesEl.querySelectorAll('.msg').forEach(el => {

const STEPS = [
  { id: 'setup', name: '1. Setup', desc: 'Init roles, exchange adaptor point, lock BTC, deploy ALPH' },
  { id: 'lock', name: '2. Lock', desc: 'Lock BTC (Bob) / Verify + Deploy ALPH (Alice)' },
  { id: 'nonces', name: '3. Nonces', desc: 'Commit-then-reveal nonce exchange' },
  { id: 'presign', name: '4. Pre-sign', desc: 'Adaptor pre-signature exchange and verification' },
  { id: 'claim', name: '5. Claim', desc: 'Alice claims BTC, Bob extracts t and claims ALPH' },
];

const stepsEl = document.getElementById('steps');

function renderSteps() {
  stepsEl.innerHTML = '';
  for (const step of STEPS) {
    const sd = state.stepData[step.id] || {};
    const status = sd.status || 'pending';
    const statusLabels = { pending: '\u25fb Pending', done: '\u2713 Done', active: '\u25b6 Active', error: '\u2717 Error' };
    const div = document.createElement('div');
    div.className = 'step';
    div.id = `step-${step.id}`;
    let bodyHtml = `<div>${step.desc}</div>`;
    if (sd.info) bodyHtml += `<div class="data">${escapeHtml(sd.info)}</div>`;
    if (sd.error) bodyHtml += `<div class="data" style="color:#f85149">${escapeHtml(sd.error)}</div>`;
    if (status === 'pending' || status === 'active') {
      bodyHtml += `<button class="step-exec primary" data-step="${step.id}" ${status === 'active' ? 'disabled' : ''}>Execute</button>`;
    }
    div.innerHTML = `
      <div class="step-header">
        <span>${step.name}</span>
        <span class="status ${status}">${statusLabels[status]}</span>
      </div>
      <div class="step-body">${bodyHtml}</div>`;
    stepsEl.appendChild(div);
  }
  // Re-attach step buttons
  stepsEl.querySelectorAll('.step-exec').forEach(btn => {
    btn.addEventListener('click', () => executeStep(btn.dataset.step));
  });
}

function updateStep(id, updates) {
  state.stepData[id] = { ...state.stepData[id], ...updates };
  renderSteps();
}

// ============================================================
// Auto-Connect (localStorage nsec, auto-generate if missing)
// ============================================================

const STORAGE_KEY = 'btc-alph-swap-nsec';

function getOrCreateNsec() {
  let hex = localStorage.getItem(STORAGE_KEY);
  if (hex && hex.length === 64) return hex;
  // Generate new key
  const sec = new Uint8Array(32);
  crypto.getRandomValues(sec);
  hex = bytesToHex(sec);
  localStorage.setItem(STORAGE_KEY, hex);
  return hex;
}

async function autoConnect() {
  const statusEl = document.getElementById('connect-status');
  const errorEl = document.getElementById('connect-error');
  const errorMsgEl = document.getElementById('connect-error-msg');
  statusEl.textContent = 'Connecting...';
  errorEl.classList.add('hidden');

  try {
    const nsecHex = getOrCreateNsec();

    // Create server session
    statusEl.textContent = 'Creating session...';
    const session = await apiPost('/api/session', { nsec: nsecHex });
    state.token = session.token;
    state.pubKeyHex = session.pubKeyHex;
    state.npub = session.npub;
    state.btcAddress = session.btcAddress;
    state.alphAddress = session.alphAddress;
    state.secBytes = hexToBytes(nsecHex);

    // Detect network mode
    statusEl.textContent = 'Detecting network...';
    try {
      const netInfo = await api('/api/network');
      state.network = netInfo.network;
    } catch { state.network = 'devnet'; }

    // Connect to relays
    statusEl.textContent = 'Connecting to Nostr relays...';
    const connected = await connectRelays(DEFAULT_RELAYS);

    // Update UI
    document.getElementById('connect-screen').style.display = 'none';
    document.getElementById('main-screen').classList.add('active');
    document.getElementById('info-npub').textContent = state.npub.slice(0, 16) + '...';
    document.getElementById('info-btc').textContent = 'BTC:' + state.btcAddress.slice(0, 12) + '...';
    document.getElementById('info-alph').textContent = 'ALPH:' + state.alphAddress.slice(0, 12) + '...';
    document.getElementById('key-info-nsec').textContent = nsecHex;

    // Network badge
    const badge = document.getElementById('network-badge');
    badge.textContent = state.network;
    badge.className = 'network-badge ' + state.network;

    // Toggle devnet/testnet UI
    applyNetworkUI();

    renderSteps();
    subscribeToEvents();
    refreshBalance();

    const relayNames = connected.map(r => r.url.replace('wss://', '')).join(', ');
    updateRelayStatus();
    addMessage('chat', `Connected via ${connected.length} relays: ${relayNames}`, 'System');
  } catch (e) {
    statusEl.textContent = '';
    errorMsgEl.textContent = 'Connection failed: ' + e.message;
    errorEl.classList.remove('hidden');
  }
}

function updateRelayStatus() {
  const el = document.getElementById('relay-status');
  const alive = state.relays.filter(r => r.ws.readyState === WebSocket.OPEN).length;
  const total = state.relays.length;
  el.textContent = `${alive}/${total} relays`;
  el.style.color = alive === 0 ? '#f85149' : alive < total ? '#d29922' : '#2ea043';
}

// ============================================================
// Event Subscription
// ============================================================

function subscribeToEvents() {
  // Only subscribe to swap protocol events from us or our peer, tagged with our session
  const authors = [state.pubKeyHex];
  if (state.peerPubHex) authors.push(state.peerPubHex);

  const filters = [
    // Swap protocol events (always scoped to our authors)
    { kinds: [SWAP_SETUP_KIND, SWAP_NONCE_KIND, SWAP_PRESIG_KIND, SWAP_CLAIM_KIND], authors },
    // Our own chat messages tagged with atomicswap
    { kinds: [1], authors: [state.pubKeyHex], '#t': ['atomicswap'] },
  ];
  // If we have a peer, also get their atomicswap chat
  if (state.peerPubHex) {
    filters.push({ kinds: [1], authors: [state.peerPubHex], '#t': ['atomicswap'] });
  }

  subscribe('swap_events', filters, (event) => {
    const isMine = event.pubkey === state.pubKeyHex;
    const authorLabel = isMine ? 'You' : event.pubkey.slice(0, 8) + '...';

    if (event.kind === 1) {
      addMessage('chat', event.content, authorLabel);
    } else {
      addProtocolMsg(event.kind, event.content, authorLabel);
    }
  });
}

// Re-subscribe when peer is set (to include their events)
function resubscribeWithPeer() {
  const unsub = state.subscriptions.get('swap_events');
  if (unsub) unsub();
  subscribeToEvents();
}

// ============================================================

async function executeStep(stepId) {
  updateStep(stepId, { status: 'active', error: null });
  try {
    if (state.role === 'alice') {
      await executeStepAlice(stepId);
    } else {
      await executeStepBob(stepId);
    }
    updateStep(stepId, { status: 'done' });
  } catch (e) {
    updateStep(stepId, { status: 'error', error: e.message });
    addMessage('chat', `Step ${stepId} error: ${e.message}`, 'System');
  }
}

// ── Alice Steps ──

async function executeStepAlice(stepId) {
  const sid = state.sessionId;
  const peer = state.peerPubHex;

  if (stepId === 'setup') {
    // Send confirmation with adaptor point
    const ap = state.stepData.setup?.adaptorPoint;
    const event = await createSwapSetup({
      sessionId: sid, recipientPubHex: peer, msgType: 'confirm',
      pubkey: state.pubKeyHex, adaptorPoint: ap,
    });
    await nostrPublish(event);
    updateStep('setup', { info: `adaptorPoint: ${ap?.slice(0, 24)}...\nWaiting for Bob's BTC lock...` });

    // Wait for btc_locked
    const btcLockedEvent = await waitForSwapEvent(SWAP_SETUP_KIND, sid, peer,
      (e) => JSON.parse(e.content).type === 'btc_locked');
    const btcLocked = JSON.parse(btcLockedEvent.content);

    // Verify BTC
    await apiPost('/api/swap/verify-btc', {
      token: state.token, txid: btcLocked.txid, vout: btcLocked.vout,
    });

    updateStep('setup', { info: `BTC locked: ${btcLocked.txid.slice(0, 16)}... vout=${btcLocked.vout}\nBTC verified. Deploying ALPH...` });
    // Auto-advance to lock
    updateStep('lock', { status: 'active' });
    await executeStepAliceLock();
    updateStep('lock', { status: 'done' });

  } else if (stepId === 'lock') {
    await executeStepAliceLock();

  } else if (stepId === 'nonces') {
    await executeNonces();

  } else if (stepId === 'presign') {
    await executePresign();

  } else if (stepId === 'claim') {
    // Claim BTC
    const result = await apiPost('/api/swap/claim-btc', { token: state.token });
    updateStep('claim', { info: `BTC claimed! txid: ${result.txid.slice(0, 24)}...` });

    // Publish claim notification
    const event = await createSwapClaim({
      sessionId: sid, recipientPubHex: peer, claimType: 'btc_claimed',
      txid: result.txid,
    });
    await nostrPublish(event);

    // Wait for Bob's ALPH claim
    updateStep('claim', { info: `BTC claimed: ${result.txid.slice(0, 16)}...\nWaiting for Bob to claim ALPH...` });
    const alphClaimedEvent = await waitForSwapEvent(SWAP_CLAIM_KIND, sid, peer,
      (e) => JSON.parse(e.content).type === 'alph_claimed');
    const alphClaimed = JSON.parse(alphClaimedEvent.content);
    updateStep('claim', { info: `BTC claimed: ${result.txid.slice(0, 16)}...\nBob claimed ALPH: ${alphClaimed.txid.slice(0, 16)}...` });
    await refreshBalance();
  }
}

async function executeStepAliceLock() {
  const sid = state.sessionId;
  const peer = state.peerPubHex;

  // Deploy ALPH contract
  const deployResult = await apiPost('/api/swap/deploy-alph', { token: state.token });
  updateStep('lock', { info: `ALPH deployed: ${deployResult.contractAddress.slice(0, 16)}...\nSending contract info...` });

  // Send contract info
  const event = await createSwapSetup({
    sessionId: sid, recipientPubHex: peer, msgType: 'alph_deployed',
    contractId: deployResult.contractId, contractAddress: deployResult.contractAddress,
  });
  await nostrPublish(event);

  // Wait for Bob's verification
  updateStep('lock', { info: `ALPH deployed: ${deployResult.contractAddress.slice(0, 16)}...\nWaiting for Bob to verify...` });
  await waitForSwapEvent(SWAP_SETUP_KIND, sid, peer,
    (e) => JSON.parse(e.content).type === 'verified');

  // Compute context
  await apiPost('/api/swap/compute-context', { token: state.token });
  updateStep('lock', { info: `ALPH: ${deployResult.contractAddress.slice(0, 16)}... | Bob verified | Context computed` });
}

// ── Bob Steps ──

async function executeStepBob(stepId) {
  const sid = state.sessionId;
  const peer = state.peerPubHex;

  if (stepId === 'setup') {
    // Wait for Alice's confirmation
    updateStep('setup', { info: 'Waiting for Alice\'s confirmation...' });
    const confirmEvent = await waitForSwapEvent(SWAP_SETUP_KIND, sid, peer,
      (e) => JSON.parse(e.content).type === 'confirm');
    const confirm = JSON.parse(confirmEvent.content);

    // Store adaptor point on server
    await apiPost('/api/swap/init', {
      token: state.token, role: 'bob', peerPubHex: peer,
      adaptorPoint: confirm.adaptorPoint, sessionId: sid,
    });

    updateStep('setup', { info: `adaptorPoint: ${confirm.adaptorPoint.slice(0, 24)}...\nLocking BTC...` });

    // Auto-advance to lock
    updateStep('lock', { status: 'active' });
    await executeStepBobLock();
    updateStep('lock', { status: 'done' });

  } else if (stepId === 'lock') {
    await executeStepBobLock();

  } else if (stepId === 'nonces') {
    await executeNonces();

  } else if (stepId === 'presign') {
    await executePresign();

  } else if (stepId === 'claim') {
    // Wait for Alice's BTC claim
    updateStep('claim', { info: 'Waiting for Alice to claim BTC...' });
    const btcClaimedEvent = await waitForSwapEvent(SWAP_CLAIM_KIND, sid, peer,
      (e) => JSON.parse(e.content).type === 'btc_claimed');
    const btcClaimed = JSON.parse(btcClaimedEvent.content);

    updateStep('claim', { info: `Alice claimed BTC: ${btcClaimed.txid.slice(0, 16)}...\nExtracting secret and claiming ALPH...` });

    // Claim ALPH (server extracts t and claims)
    const result = await apiPost('/api/swap/claim-alph', {
      token: state.token, btcClaimTxid: btcClaimed.txid,
    });

    // Publish claim notification
    const event = await createSwapClaim({
      sessionId: sid, recipientPubHex: peer, claimType: 'alph_claimed',
      txid: result.txid,
    });
    await nostrPublish(event);

    updateStep('claim', { info: `Alice BTC: ${btcClaimed.txid.slice(0, 16)}...\nALPH claimed: ${result.txid.slice(0, 16)}...` });
    await refreshBalance();
  }
}

async function executeStepBobLock() {
  const sid = state.sessionId;
  const peer = state.peerPubHex;

  // Lock BTC — pass selected UTXO on testnet
  const lockBody = { token: state.token };
  if (state.network === 'testnet' && state.selectedUtxo) {
    lockBody.utxoTxid = state.selectedUtxo.txid;
    lockBody.utxoVout = state.selectedUtxo.vout;
    lockBody.utxoValue = state.selectedUtxo.value;
  }
  const lockResult = await apiPost('/api/swap/lock-btc', lockBody);
  updateStep('lock', { info: `BTC locked: ${lockResult.txid.slice(0, 16)}... vout=${lockResult.vout}\nPublishing...` });

  // Publish btc_locked
  const event = await createSwapSetup({
    sessionId: sid, recipientPubHex: peer, msgType: 'btc_locked',
    txid: lockResult.txid, vout: lockResult.vout, amountSat: lockResult.amountSat,
  });
  await nostrPublish(event);

  // Wait for ALPH deployment
  updateStep('lock', { info: `BTC locked: ${lockResult.txid.slice(0, 16)}...\nWaiting for Alice to deploy ALPH...` });
  const alphDeployedEvent = await waitForSwapEvent(SWAP_SETUP_KIND, sid, peer,
    (e) => JSON.parse(e.content).type === 'alph_deployed');
  const alphDeployed = JSON.parse(alphDeployedEvent.content);

  // Verify ALPH
  await apiPost('/api/swap/verify-alph', {
    token: state.token,
    contractId: alphDeployed.contractId,
    contractAddress: alphDeployed.contractAddress,
  });

  // Send verified
  const verifiedEvent = await createSwapSetup({
    sessionId: sid, recipientPubHex: peer, msgType: 'verified',
  });
  await nostrPublish(verifiedEvent);

  // Compute context
  await apiPost('/api/swap/compute-context', { token: state.token });
  updateStep('lock', { info: `BTC: ${lockResult.txid.slice(0, 16)}... | ALPH: ${alphDeployed.contractAddress.slice(0, 12)}... | Verified` });
}

// ── Shared Steps ──

async function executeNonces() {
  const sid = state.sessionId;
  const peer = state.peerPubHex;
  const isAlice = state.role === 'alice';

  // Generate nonce commitments
  const commitResult = await apiPost('/api/swap/nonce-commit', { token: state.token });

  if (isAlice) {
    // Alice sends first
    const commitEvent = await createSwapNonce({
      sessionId: sid, recipientPubHex: peer, phase: 'commit',
      btcNonceHash: commitResult.btcNonceHash, alphNonceHash: commitResult.alphNonceHash,
    });
    await nostrPublish(commitEvent);
    updateStep('nonces', { info: 'Commitment sent. Waiting for peer...' });

    // Wait for peer commit
    const peerCommitEvent = await waitForSwapEvent(SWAP_NONCE_KIND, sid, peer,
      (e) => JSON.parse(e.content).phase === 'commit');
    const peerCommit = JSON.parse(peerCommitEvent.content);

    // Reveal
    const revealResult = await apiPost('/api/swap/nonce-reveal', {
      token: state.token,
      peerBtcNonceHash: peerCommit.btcNonceHash,
      peerAlphNonceHash: peerCommit.alphNonceHash,
    });

    const revealEvent = await createSwapNonce({
      sessionId: sid, recipientPubHex: peer, phase: 'reveal',
      btcPubNonce: revealResult.btcPubNonce, alphPubNonce: revealResult.alphPubNonce,
    });
    await nostrPublish(revealEvent);
    updateStep('nonces', { info: 'Nonces revealed. Waiting for peer reveal...' });

    // Wait for peer reveal
    const peerRevealEvent = await waitForSwapEvent(SWAP_NONCE_KIND, sid, peer,
      (e) => JSON.parse(e.content).phase === 'reveal');
    const peerReveal = JSON.parse(peerRevealEvent.content);

    // Verify
    await apiPost('/api/swap/nonce-verify', {
      token: state.token,
      peerBtcPubNonce: peerReveal.btcPubNonce,
      peerAlphPubNonce: peerReveal.alphPubNonce,
    });

  } else {
    // Bob waits first
    updateStep('nonces', { info: 'Waiting for Alice\'s commitment...' });
    const peerCommitEvent = await waitForSwapEvent(SWAP_NONCE_KIND, sid, peer,
      (e) => JSON.parse(e.content).phase === 'commit');
    const peerCommit = JSON.parse(peerCommitEvent.content);

    // Send our commit
    const commitEvent = await createSwapNonce({
      sessionId: sid, recipientPubHex: peer, phase: 'commit',
      btcNonceHash: commitResult.btcNonceHash, alphNonceHash: commitResult.alphNonceHash,
    });
    await nostrPublish(commitEvent);

    // Wait for peer reveal
    updateStep('nonces', { info: 'Commitment exchanged. Waiting for peer reveal...' });
    const peerRevealEvent = await waitForSwapEvent(SWAP_NONCE_KIND, sid, peer,
      (e) => JSON.parse(e.content).phase === 'reveal');
    const peerReveal = JSON.parse(peerRevealEvent.content);

    // Send our reveal
    const revealResult = await apiPost('/api/swap/nonce-reveal', {
      token: state.token,
      peerBtcNonceHash: peerCommit.btcNonceHash,
      peerAlphNonceHash: peerCommit.alphNonceHash,
    });

    const revealEvent = await createSwapNonce({
      sessionId: sid, recipientPubHex: peer, phase: 'reveal',
      btcPubNonce: revealResult.btcPubNonce, alphPubNonce: revealResult.alphPubNonce,
    });
    await nostrPublish(revealEvent);

    // Verify peer
    await apiPost('/api/swap/nonce-verify', {
      token: state.token,
      peerBtcPubNonce: peerReveal.btcPubNonce,
      peerAlphPubNonce: peerReveal.alphPubNonce,
    });
  }

  updateStep('nonces', { info: 'Nonces committed, revealed, verified, and aggregated' });
}

async function executePresign() {
  const sid = state.sessionId;
  const peer = state.peerPubHex;
  const isAlice = state.role === 'alice';

  // Generate our presigs
  const presigResult = await apiPost('/api/swap/presign', { token: state.token });

  if (isAlice) {
    // Alice sends first
    const presigEvent = await createSwapPresig({
      sessionId: sid, recipientPubHex: peer,
      btcPresig: presigResult.btcPresig, alphPresig: presigResult.alphPresig,
    });
    await nostrPublish(presigEvent);
    updateStep('presign', { info: 'Pre-signatures sent. Waiting for peer...' });

    // Wait for peer presigs
    const peerPresigEvent = await waitForSwapEvent(SWAP_PRESIG_KIND, sid, peer);
    const peerPresigs = JSON.parse(peerPresigEvent.content);

    // Verify and aggregate
    await apiPost('/api/swap/verify-presig', {
      token: state.token,
      peerBtcPresig: peerPresigs.btcPresig,
      peerAlphPresig: peerPresigs.alphPresig,
    });

  } else {
    // Bob waits first
    updateStep('presign', { info: 'Waiting for Alice\'s pre-signatures...' });
    const peerPresigEvent = await waitForSwapEvent(SWAP_PRESIG_KIND, sid, peer);
    const peerPresigs = JSON.parse(peerPresigEvent.content);

    // Verify peer's presigs
    await apiPost('/api/swap/verify-presig', {
      token: state.token,
      peerBtcPresig: peerPresigs.btcPresig,
      peerAlphPresig: peerPresigs.alphPresig,
    });

    // Send our presigs
    const presigEvent = await createSwapPresig({
      sessionId: sid, recipientPubHex: peer,
      btcPresig: presigResult.btcPresig, alphPresig: presigResult.alphPresig,
    });
    await nostrPublish(presigEvent);
  }

  updateStep('presign', { info: 'Pre-signatures exchanged, verified, aggregated with taproot tweak' });
}

autoConnect().catch(e => {
  console.error('autoConnect fatal:', e);
  const s = document.getElementById('connect-status');
  const em = document.getElementById('connect-error-msg');
  const ee = document.getElementById('connect-error');
  if (s) s.textContent = '';
  if (em) em.textContent = 'Fatal: ' + e.message;
  if (ee) ee.classList.remove('hidden');
});
